<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="Smart Bus Management System - Real-time school bus tracking for students, parents, drivers, and admins" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SmartBus" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="SmartBus - School Bus Tracker" />
    <meta property="og:description" content="Real-time GPS tracking for school buses" />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.jpg" />
    <meta property="og:url" content="https://smartbus.example.com" />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SmartBus - School Bus Tracker" />
    <meta name="twitter:description" content="Real-time GPS tracking for school buses" />
    <meta name="twitter:image" content="%PUBLIC_URL%/twitter-image.jpg" />
    
    <title>SmartBus - School Bus Management</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- Manifest only - icons handled by react-icons package -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Service Worker disabled in development -->
    
    <!-- PWA Install Prompt -->
    <script>
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Show install button
        document.querySelector('#install-banner')?.classList.add('show');
      });

      window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        document.querySelector('#install-banner')?.classList.remove('show');
      });
    </script>
  </body>
</html>
